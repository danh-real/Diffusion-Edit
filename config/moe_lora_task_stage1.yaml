flux_path: "ckpt/FLUX.1-Kontext-dev"
lora_path: null
dtype: "bfloat16"

model:
  union_cond_attn: true
  add_cond_attn: false
  latent_lora: false
  use_sep: false
  use_type_embedding: false
  train_route_only: false

train:
  batch_size: 1
  accumulate_grad_batches: 8
  dataloader_workers: 4
  save_interval: 10
  sample_interval: 10
  max_steps: 100000
  gradient_checkpointing: true
  save_path: "runs/train_moe_lora_stage1overfit"

  condition_type: "edit"
  dataset:
    type: "any_edit"
    json_path: "/data/datasets/AnyEdit/train.json"
    root_path: "/data/datasets"
    condition_size: 512
    target_size: 512
    image_size: 512
    padding: 8
    drop_text_prob: 0.1
    drop_image_prob: 0.1
    specific_task: [ "add", "remove", "action_change", "style_change", "background_change", "rotation_change" ]

  wandb:
    project: "Edit"
    run_name: "task-specific-moe-lora"

  lora_config:
    r: 32
    lora_alpha: 32
    init_lora_weights: "gaussian"
    target_modules: "(.*x_embedder|.*(?<!single_)transformer_blocks\\.[0-9]+\\.norm1\\.linear|.*(?<!single_)transformer_blocks\\.[0-9]+\\.attn\\.to_k|.*(?<!single_)transformer_blocks\\.[0-9]+\\.attn\\.to_q|.*(?<!single_)transformer_blocks\\.[0-9]+\\.attn\\.to_v|.*(?<!single_)transformer_blocks\\.[0-9]+\\.attn\\.to_out\\.0|.*(?<!single_)transformer_blocks\\.[0-9]+\\.ff\\.net\\.2|.*single_transformer_blocks\\.[0-9]+\\.norm\\.linear|.*single_transformer_blocks\\.[0-9]+\\.proj_mlp|.*single_transformer_blocks\\.[0-9]+\\.proj_out|.*single_transformer_blocks\\.[0-9]+\\.attn.to_k|.*single_transformer_blocks\\.[0-9]+\\.attn.to_q|.*single_transformer_blocks\\.[0-9]+\\.attn.to_v|.*single_transformer_blocks\\.[0-9]+\\.attn.to_out)"
    num_experts: 8
    expert_rank: 32
    expert_alpha: 32
    top_k: 3
    route_input_dim: 768

  task_expert_map:
    add: [0, 6, 7]
    remove: [1, 6, 7]
    action_change: [2, 6, 7]
    style_change: [3, 6, 7]
    background_change: [4, 6, 7]
    rotation_change: [5, 6, 7]

  optimizer:
    type: "Prodigy"
    params:
      lr: 1
      use_bias_correction: true
      safeguard_warmup: true
      weight_decay: 0.01
