flux_path: "ckpt/FLUX.1-Kontext-dev"
lora_path: null
dtype: "bfloat16"

model:
  union_cond_attn: true
  add_cond_attn: false
  latent_lora: false
  use_sep: false
  use_type_embedding: false
  train_route_only: false
  router_similarity_coeff: 0.0

train:
  batch_size: 1
  accumulate_grad_batches: 8
  dataloader_workers: 4
  save_interval: 5000
  sample_interval: 5000
  max_steps: 500000
  gradient_checkpointing: true
  save_path: "runs/task-specific-moe-lora-stage1overfit-identity-r128"

  condition_type: "edit"
  dataset:
    type: "any_edit"
    json_path: "/data/sd/datasets/AnyEdit/train.json"
    root_path: "/data/sd/datasets"
    condition_size: 512
    target_size: 512
    image_size: 512
    padding: 8
    drop_text_prob: 0.1
    drop_image_prob: 0.1
    specific_task: ["add", "remove", "replace"]

  wandb:
    project: "Edit"
    run_name: "task-specific-moe-lora-stage1overfit-identity-r128"

  lora_config:
    r: 128
    lora_alpha: 128
    init_lora_weights: "gaussian"
    target_modules: "(.*x_embedder|.*(?<!single_)transformer_blocks\\.[0-9]+\\.norm1\\.linear|.*(?<!single_)transformer_blocks\\.[0-9]+\\.attn\\.to_k|.*(?<!single_)transformer_blocks\\.[0-9]+\\.attn\\.to_q|.*(?<!single_)transformer_blocks\\.[0-9]+\\.attn\\.to_v|.*(?<!single_)transformer_blocks\\.[0-9]+\\.attn\\.to_out\\.0|.*(?<!single_)transformer_blocks\\.[0-9]+\\.ff\\.net\\.2|.*single_transformer_blocks\\.[0-9]+\\.norm\\.linear|.*single_transformer_blocks\\.[0-9]+\\.proj_mlp|.*single_transformer_blocks\\.[0-9]+\\.proj_out|.*single_transformer_blocks\\.[0-9]+\\.attn.to_k|.*single_transformer_blocks\\.[0-9]+\\.attn.to_q|.*single_transformer_blocks\\.[0-9]+\\.attn.to_v|.*single_transformer_blocks\\.[0-9]+\\.attn.to_out)"
    num_experts: 4
    expert_rank: 32
    expert_alpha: 32
    top_k: 2
    route_input_dim: 768
    routing_choice: "tc"
    routing_act: "identity"

  task_expert_map:
    add: [0, 3]
    remove: [1, 3]
    replace: [2, 3]

  optimizer:
    type: "AdamW"
    params:
      lr: 0.0001
      weight_decay: 0.01
