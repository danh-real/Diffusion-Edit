flux_path: "/data/repos/models/ICEdit/ckpt/FLUX.1-Fill-dev"
lora_path: "/data/repos/models/ICEdit/ckpt/ICEdit-MoE-LoRA.safetensors"
dtype: "bfloat16"

model:
  union_cond_attn: true
  add_cond_attn: false
  latent_lora: false
  use_sep: false
  use_type_embedding: false

train:
  batch_size: 1
  accumulate_grad_batches: 1
  dataloader_workers: 4
  save_interval: 1000
  sample_interval: 1000
  max_steps: 5000
  gradient_checkpointing: true
  save_path: "runs/train_route_lora+rl+aux"

  condition_type: "edit"
  dataset:
    type: "any_edit"
    json_path: "/data/datasets/AnyEdit/train.json"
    root_path: "/data/datasets"
    condition_size: 512
    target_size: 512
    drop_text_prob: 0.1
    specific_task: null

  wandb:
    project: "ICEdit-RL"

  # ── GRPO routing RL config ────────────────────────────────────────────────
  rl:
    train_lora: false
    num_rollouts: 8             # G — stochastic routing samples per batch
                                # Lower → faster steps, higher variance
                                # Higher → better advantage estimates, more VRAM
    supervised_coeff: 1.0       # Keep supervised signal dominant
    rl_coeff: 1.0               # Weight of policy-gradient loss vs supervised loss
    load_balancing_coeff: 0.001 # Weight of load balancing loss
    z_coeff: 0.001              # Weight of router z loss
    stochastic_ratio: 0.1       # Fraction of tokens routed stochastically per rollout
                                # 1.0 = all tokens stochastic (original behaviour)
                                # 0.5 = half tokens stochastic, rest use greedy lora_route
    reward:
      type: "mse"               # "mse" = negative per-sample MSE (default)
                                # Add a branch in build_reward_fn() for custom metrics

  lora_config:
    r: 32
    lora_alpha: 32
    init_lora_weights: "gaussian"
    target_modules: "(.*x_embedder|.*(?<!single_)transformer_blocks\\.[0-9]+\\.norm1\\.linear|.*(?<!single_)transformer_blocks\\.[0-9]+\\.attn\\.to_k|.*(?<!single_)transformer_blocks\\.[0-9]+\\.attn\\.to_q|.*(?<!single_)transformer_blocks\\.[0-9]+\\.attn\\.to_v|.*(?<!single_)transformer_blocks\\.[0-9]+\\.attn\\.to_out\\.0|.*(?<!single_)transformer_blocks\\.[0-9]+\\.ff\\.net\\.2|.*single_transformer_blocks\\.[0-9]+\\.norm\\.linear|.*single_transformer_blocks\\.[0-9]+\\.proj_mlp|.*single_transformer_blocks\\.[0-9]+\\.proj_out|.*single_transformer_blocks\\.[0-9]+\\.attn.to_k|.*single_transformer_blocks\\.[0-9]+\\.attn.to_q|.*single_transformer_blocks\\.[0-9]+\\.attn.to_v|.*single_transformer_blocks\\.[0-9]+\\.attn.to_out)"
    num_experts: 4
    expert_rank: 32
    expert_alpha: 32
    top_k: 1

  optimizer:
    type: "Prodigy"
    params:
      lr: 1
      use_bias_correction: true
      safeguard_warmup: true
      weight_decay: 0.01
