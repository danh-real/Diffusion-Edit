flux_path: "ckpt/FLUX.1-Kontext-dev"
# lora_path: "runs/task-specific-moe-lora-stage1overfit-identity-r128-disjoint/20260717-082734/ckpt/125000"
lora_path: null
dtype: "bfloat16"

model:
  union_cond_attn: true
  add_cond_attn: false
  latent_lora: false
  use_sep: false
  use_type_embedding: false
  train_route_only: false

train:
  batch_size: 1
  accumulate_grad_batches: 64
  dataloader_workers: 8
  save_interval: 1000
  sample_interval: 1000
  max_steps: 500000
  gradient_checkpointing: true
  save_path: "runs/task-specific-moe-lora-bothstage-identity-r128-resize"

  condition_type: "edit"
  dataset:
    type: "any_edit"
    json_path: "/data/sd/datasets/AnyEdit/train.json"
    root_path: "/data/sd/datasets"
    condition_size: 512
    target_size: 512
    image_size: 512
    padding: 8
    drop_text_prob: 0.1
    drop_image_prob: 0.1
    specific_task: ["resize"]

  wandb:
    project: "Edit"
    run_name: "task-specific-moe-lora-bothstage-identity-r128-resize"

  # ── Router-level GRPO, reward from EditScore-8B (src/train/router_grpo.py) ────────────
  # rl_coeff > 0 -> training_step calls rl_step (supervised loss + GRPO term) instead of the
  # plain supervised step(). RL always uses free routing, bypassing task_expert_map below
  # (fixed routing and router-exploration are contradictory) -- see rl_step's docstring.
  # This algorithm's policy gradient only ever updates lora_route (the router), regardless of
  # model.train_route_only above.
  rl:
    num_rollouts: 8              # G — stochastic routing samples per input
                                 # Lower -> faster/cheaper steps, higher-variance advantage estimate
    num_sampling_steps: 12       # T — Euler denoising steps for the RL rollout only
                                 # (independent of any inference-time step count)
    stochastic_step_ratio: 0.3   # fraction of the T steps that route stochastically;
                                 # the rest route greedily and contribute no policy gradient
    clip_eps: 0.2                # PPO clip range
    rl_coeff: 0.0                # weight of the GRPO policy-gradient loss
    supervised_coeff: 1.0        # weight of the plain flow-matching loss, kept for stability
    load_balancing_coeff: 0.0    # Switch-Transformer load-balancing loss on the sampled steps
    z_coeff: 0.0                 # router z-loss on the sampled steps

    reward:
      type: "editscore"
      model_id: "ckpt/Qwen3-VL-8B-Instruct"
      lora_id: "ckpt/EditScore-Qwen3-VL-8B-Instruct"
      device: "cuda:1"           # separate device from the policy model -- now actually honored,
                                  # see src/train/editscore_reward.py's _pin_qwen3vl_device
      dtype: "bfloat16"
      k_ensemble: 1               # Avg@K judge passes per image (paper's self-ensemble); raise
                                   # once the reward signal itself is validated (cost multiplies by K)
      aggregation: "min"          # SC's two sub-scores (editing success, overediting) and PQ's
                                   # two sub-scores (naturalness, artifacts) each collapse to a
                                   # single scalar via min() rather than mean() -- stricter: an
                                   # edit only gets credit if it isn't badly broken on either axis

  lora_config:
    r: 64
    lora_alpha: 64
    init_lora_weights: "gaussian"
    target_modules: "(.*x_embedder|.*(?<!single_)transformer_blocks\\.[0-9]+\\.norm1\\.linear|.*(?<!single_)transformer_blocks\\.[0-9]+\\.attn\\.to_k|.*(?<!single_)transformer_blocks\\.[0-9]+\\.attn\\.to_q|.*(?<!single_)transformer_blocks\\.[0-9]+\\.attn\\.to_v|.*(?<!single_)transformer_blocks\\.[0-9]+\\.attn\\.to_out\\.0|.*(?<!single_)transformer_blocks\\.[0-9]+\\.ff\\.net\\.2|.*single_transformer_blocks\\.[0-9]+\\.norm\\.linear|.*single_transformer_blocks\\.[0-9]+\\.proj_mlp|.*single_transformer_blocks\\.[0-9]+\\.proj_out|.*single_transformer_blocks\\.[0-9]+\\.attn.to_k|.*single_transformer_blocks\\.[0-9]+\\.attn.to_q|.*single_transformer_blocks\\.[0-9]+\\.attn.to_v|.*single_transformer_blocks\\.[0-9]+\\.attn.to_out)"
    num_experts: 4
    expert_rank: 32
    expert_alpha: 32
    top_k: 2
    route_input_dim: 768
    routing_choice: "tc"
    routing_act: "identity"

  stage2_lora_config:
    # freeze_stage1: true  -> stage 1's "default" adapter is frozen; only "stage2" trains.
    # freeze_stage1: false -> stage 1 keeps training alongside stage 2 (joint fine-tune).
    freeze_stage1: false
    # target_modules matches stage 1's exactly, so stage 2 refines every layer stage 1
    # touched. The two ranks below cover the two kinds of layer this hits:
    #   - MoE layers (ff.net.2 / proj_out): expert_rank/expert_alpha size one extra
    #     per-expert LoRA nested on each frozen stage-1 expert, sharing its router.
    #   - every other layer: r/lora_alpha size a plain LoRA running in parallel with
    #     stage 1's frozen r=128 LoRA there.
    r: 16
    lora_alpha: 16
    init_lora_weights: "gaussian"
    target_modules: "(.*x_embedder|.*(?<!single_)transformer_blocks\\.[0-9]+\\.norm1\\.linear|.*(?<!single_)transformer_blocks\\.[0-9]+\\.attn\\.to_k|.*(?<!single_)transformer_blocks\\.[0-9]+\\.attn\\.to_q|.*(?<!single_)transformer_blocks\\.[0-9]+\\.attn\\.to_v|.*(?<!single_)transformer_blocks\\.[0-9]+\\.attn\\.to_out\\.0|.*(?<!single_)transformer_blocks\\.[0-9]+\\.ff\\.net\\.2|.*single_transformer_blocks\\.[0-9]+\\.norm\\.linear|.*single_transformer_blocks\\.[0-9]+\\.proj_mlp|.*single_transformer_blocks\\.[0-9]+\\.proj_out|.*single_transformer_blocks\\.[0-9]+\\.attn.to_k|.*single_transformer_blocks\\.[0-9]+\\.attn.to_q|.*single_transformer_blocks\\.[0-9]+\\.attn.to_v|.*single_transformer_blocks\\.[0-9]+\\.attn.to_out)"
    moe_companion_of: "default"
    num_experts: 4           # must equal stage-1's num_experts (enforced at build time)
    expert_rank: 8            # stage-2's own, typically smaller, per-expert rank
    expert_alpha: 8

  optimizer:
    type: "AdamW"
    params:
      lr: 0.0001
      weight_decay: 0.01
